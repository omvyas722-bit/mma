name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  IS_MAIN_PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'true' || 'false' }}

jobs:
  # Frontend Tests
  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-node_modules-${{ hashFiles('frontend/package-lock.json') }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run linter
        working-directory: ./frontend
        run: npm run lint

      - name: Run tests
        working-directory: ./frontend
        run: npm test -- --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend

      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}

  # Frontend E2E Tests (Playwright)
  frontend-e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-node_modules-${{ hashFiles('frontend/package-lock.json') }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install chromium

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Initialize backend database
        working-directory: ./backend
        run: npm run db:init
        env:
          JWT_SECRET: test-jwt-secret-for-ci
          OPENROUTER_API_KEY: ''

      - name: Run E2E tests
        working-directory: ./frontend
        run: npx playwright test
        env:
          JWT_SECRET: test-jwt-secret-for-ci
          OPENROUTER_API_KEY: ''
          OPENROUTER_RETRY_DELAY_MS: '1'

  # Backend Tests
  backend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-backend-node_modules-${{ hashFiles('backend/package-lock.json') }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run linter
        working-directory: ./backend
        run: npm run lint

      - name: Initialize database
        working-directory: ./backend
        run: npm run db:init

      - name: Run tests
        working-directory: ./backend
        run: npm test
        if: always()
        env:
          OPENROUTER_RETRY_DELAY_MS: '1'

  # Backend audit
  backend-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: npm audit
        working-directory: ./backend
        run: npm audit --audit-level=high
        continue-on-error: true

  # Build Docker Images
  build:
    needs: [frontend-test, frontend-e2e, backend-test, backend-audit]
    runs-on: ubuntu-latest
    if: env.IS_MAIN_PUSH == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/roar-mma-frontend:latest,${{ secrets.DOCKER_USERNAME }}/roar-mma-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/roar-mma-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/roar-mma-frontend:buildcache,mode=max

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/roar-mma-backend:latest,${{ secrets.DOCKER_USERNAME }}/roar-mma-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/roar-mma-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/roar-mma-backend:buildcache,mode=max

  # Deploy to Production
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: env.IS_MAIN_PUSH == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then echo "Missing DEPLOY_HOST secret"; exit 1; fi
          if [ -z "${{ secrets.DEPLOY_USER }}" ]; then echo "Missing DEPLOY_USER secret"; exit 1; fi
          if [ -z "${{ secrets.DEPLOY_KEY }}" ]; then echo "Missing DEPLOY_KEY secret"; exit 1; fi
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then echo "Missing DOCKER_USERNAME secret"; exit 1; fi

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/roar-mma
            docker-compose pull
            docker-compose up -d
            docker system prune -f --filter "until=24h"

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            curl -sf ${{ secrets.DEPLOY_URL }}/api/health && break
            sleep 5
          done

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'ROAR MMA deployed successfully!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()
