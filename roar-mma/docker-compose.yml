services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: roar-mma-backend
    restart: unless-stopped
    expose:
      - "3001"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - ${ENV_FILE:-./backend/.env}
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - DATABASE_PATH=/app/data/roarmma.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required. Set it in .env or environment.}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    volumes:
      - data-volume:/app/data
      - logs-volume:/app/logs
      - backups-volume:/app/backups
    networks:
      - roar-network
    healthcheck:
      test: ["CMD", "node", "-e", "try { require('http').get('http://localhost:3001/api/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1)) } catch(e) { process.exit(1) }"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: roar-mma-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - roar-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  data-volume:
  logs-volume:
  backups-volume:

networks:
  roar-network:
    driver: bridge


