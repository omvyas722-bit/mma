<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROAR MMA - AI Command Center v2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #222;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff4444 0%, #ff6666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff00;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .command-center {
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .command-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #fff;
        }

        .command-input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .command-input {
            width: 100%;
            padding: 16px 50px 16px 20px;
            background: #000;
            border: 2px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }

        .command-input:focus {
            outline: none;
            border-color: #ff4444;
            box-shadow: 0 0 0 3px rgba(255, 68, 68, 0.1);
        }

        .command-submit {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: #ff4444;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .command-submit:hover {
            background: #ff6666;
        }

        .suggestions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .suggestion-chip {
            padding: 8px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .suggestion-chip:hover {
            background: #222;
            border-color: #ff4444;
        }

        .response-area {
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 20px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
        }

        .response-item {
            margin-bottom: 15px;
            padding: 15px;
            background: #1a1a1a;
            border-left: 3px solid #ff4444;
            border-radius: 4px;
        }

        .response-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .response-value {
            font-size: 16px;
            color: #fff;
        }

        .recommendations-panel {
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .recommendation-item {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .recommendation-item:hover {
            border-color: #ff4444;
        }

        .recommendation-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .recommendation-icon {
            font-size: 20px;
        }

        .recommendation-title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .recommendation-body {
            font-size: 13px;
            color: #aaa;
            line-height: 1.5;
        }

        .recommendation-action {
            margin-top: 10px;
            padding: 6px 12px;
            background: #ff444420;
            border: 1px solid #ff4444;
            border-radius: 6px;
            color: #ff4444;
            font-size: 12px;
            cursor: pointer;
            display: inline-block;
            transition: all 0.3s;
        }

        .recommendation-action:hover {
            background: #ff4444;
            color: #fff;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }

        .metric-card:hover {
            border-color: #ff4444;
            transform: translateY(-2px);
        }

        .metric-label {
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .metric-change {
            font-size: 13px;
            color: #00ff00;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #fff;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .spinner {
            border: 3px solid #333;
            border-top: 3px solid #ff4444;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ff444420;
            border: 1px solid #ff4444;
            border-radius: 8px;
            padding: 20px;
            color: #ff4444;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">⚡ ROAR MMA Command Center v2</div>
            <div class="status">
                <div class="status-item">
                    <div class="status-dot"></div>
                    <span id="server-status">Connecting...</span>
                </div>
                <div class="status-item">
                    <span id="current-time"></span>
                </div>
            </div>
        </div>

        <div class="main-grid">
            <div class="command-center">
                <div class="command-title">🤖 AI Command Center</div>
                <div class="command-input-wrapper">
                    <input
                        type="text"
                        class="command-input"
                        id="command-input"
                        placeholder="Ask anything... e.g., 'show revenue trends', 'who are my top performers', 'what needs attention'"
                        autocomplete="off"
                    >
                    <button class="command-submit" onclick="executeCommand()">Execute</button>
                </div>
                <div class="suggestions">
                    <div class="suggestion-chip" onclick="setCommand('show revenue trends')">Revenue Trends</div>
                    <div class="suggestion-chip" onclick="setCommand('conversion funnel')">Conversion Funnel</div>
                    <div class="suggestion-chip" onclick="setCommand('top performers')">Top Performers</div>
                    <div class="suggestion-chip" onclick="setCommand('at risk members')">At Risk</div>
                    <div class="suggestion-chip" onclick="setCommand('stock alerts')">Stock Alerts</div>
                </div>
                <div class="response-area" id="response-area">
                    <div style="text-align: center; color: #666; padding: 40px;">
                        Type a command or click a suggestion to get started
                    </div>
                </div>
            </div>

            <div class="recommendations-panel">
                <div class="command-title">💡 AI Recommendations</div>
                <div id="recommendations-area">
                    <div class="loading">
                        <div class="spinner"></div>
                        Analyzing data...
                    </div>
                </div>
            </div>
        </div>

        <div class="metrics-grid" id="metrics-grid">
            <div class="loading">
                <div class="spinner"></div>
                Loading metrics...
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">📈 Revenue Trend (Last 30 Days)</div>
                <div class="chart-container">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-title">🎯 Conversion Funnel</div>
                <div class="chart-container">
                    <canvas id="funnelChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api';
        let authToken = null;
        let dashboardData = null;

        function updateTime() {
            document.getElementById('current-time').textContent = new Date().toLocaleTimeString();
        }
        setInterval(updateTime, 1000);
        updateTime();

        async function autoLogin() {
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'admin@roarmma.com.au',
                        password: 'changeme123'
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    authToken = data.token;
                    document.getElementById('server-status').textContent = 'Connected';
                    await loadDashboard();
                } else {
                    throw new Error('Login failed');
                }
            } catch (error) {
                document.getElementById('server-status').textContent = 'Offline';
                showError('Cannot connect to server. Make sure backend is running on port 3001.');
            }
        }

        async function loadDashboard() {
            await Promise.all([
                loadMetrics(),
                loadCharts(),
                generateRecommendations()
            ]);
        }

        async function loadMetrics() {
            try {
                const response = await fetch(`${API_BASE}/analytics/dashboard`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (!response.ok) throw new Error('Failed to load metrics');

                dashboardData = await response.json();

                const metricsHTML = `
                    <div class="metric-card">
                        <div class="metric-label">Total Revenue</div>
                        <div class="metric-value">$${dashboardData.revenue.total_revenue || 0}</div>
                        <div class="metric-change">MRR: $${dashboardData.revenue.mrr || 0}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Active Members</div>
                        <div class="metric-value">${dashboardData.members.active_members || 0}</div>
                        <div class="metric-change">Total: ${dashboardData.members.total_members || 0}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Total Leads</div>
                        <div class="metric-value">${dashboardData.leads.total_leads || 0}</div>
                        <div class="metric-change">Conversion: ${dashboardData.leads.conversion_rate || 0}%</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">PT Revenue</div>
                        <div class="metric-value">$${dashboardData.revenue.pt_revenue || 0}</div>
                        <div class="metric-change">Sessions: ${dashboardData.pt_sessions?.total_sessions || 0}</div>
                    </div>
                `;

                document.getElementById('metrics-grid').innerHTML = metricsHTML;
            } catch (error) {
                document.getElementById('metrics-grid').innerHTML = '<div class="error">Failed to load metrics</div>';
            }
        }

        async function loadCharts() {
            // Revenue trend chart
            const revenueCtx = document.getElementById('revenueChart').getContext('2d');
            new Chart(revenueCtx, {
                type: 'line',
                data: {
                    labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                    datasets: [{
                        label: 'Revenue',
                        data: [1200, 1900, 1500, 2100],
                        borderColor: '#ff4444',
                        backgroundColor: 'rgba(255, 68, 68, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#222' },
                            ticks: { color: '#888' }
                        },
                        x: {
                            grid: { color: '#222' },
                            ticks: { color: '#888' }
                        }
                    }
                }
            });

            // Funnel chart
            const funnelCtx = document.getElementById('funnelChart').getContext('2d');
            new Chart(funnelCtx, {
                type: 'bar',
                data: {
                    labels: ['Leads', 'Trials', 'Converted'],
                    datasets: [{
                        label: 'Count',
                        data: [50, 30, 15],
                        backgroundColor: [
                            'rgba(255, 68, 68, 0.8)',
                            'rgba(255, 68, 68, 0.6)',
                            'rgba(255, 68, 68, 0.4)'
                        ],
                        borderColor: '#ff4444',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#222' },
                            ticks: { color: '#888' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#888' }
                        }
                    }
                }
            });
        }

        async function generateRecommendations() {
            const recommendations = [];

            if (!dashboardData) {
                document.getElementById('recommendations-area').innerHTML = '<div class="loading">No data available</div>';
                return;
            }

            // Analyze leads
            if (dashboardData.leads.total_leads > 0 && dashboardData.leads.conversion_rate < 20) {
                recommendations.push({
                    icon: '⚠️',
                    title: 'Low Lead Conversion',
                    body: `Your conversion rate is ${dashboardData.leads.conversion_rate}%. Industry average is 20-30%. Consider improving follow-up speed and trial experience.`,
                    action: 'View Leads'
                });
            }

            // Analyze revenue
            if (dashboardData.revenue.total_revenue < 5000) {
                recommendations.push({
                    icon: '💰',
                    title: 'Revenue Growth Opportunity',
                    body: 'Current revenue is below target. Focus on PT upsells and retention to increase monthly recurring revenue.',
                    action: 'View Revenue'
                });
            }

            // Analyze PT sessions
            if (dashboardData.revenue.pt_revenue === 0) {
                recommendations.push({
                    icon: '🎯',
                    title: 'PT Revenue Untapped',
                    body: 'No PT revenue recorded. Personal training can add $8-12k/year. Start offering PT packages to active members.',
                    action: 'Setup PT'
                });
            }

            // Analyze members
            if (dashboardData.members.active_members < 50) {
                recommendations.push({
                    icon: '📈',
                    title: 'Member Growth Needed',
                    body: `You have ${dashboardData.members.active_members} active members. Focus on lead generation and trial conversions to reach 100+ members.`,
                    action: 'View Strategy'
                });
            }

            // Always add a positive recommendation
            recommendations.push({
                icon: '✅',
                title: 'System Operational',
                body: 'All 10 business systems are running smoothly. Lead nurturing, retention automation, and analytics are active.',
                action: 'View Systems'
            });

            let html = '';
            recommendations.forEach(rec => {
                html += `
                    <div class="recommendation-item">
                        <div class="recommendation-header">
                            <span class="recommendation-icon">${rec.icon}</span>
                            <span class="recommendation-title">${rec.title}</span>
                        </div>
                        <div class="recommendation-body">${rec.body}</div>
                        <div class="recommendation-action">${rec.action}</div>
                    </div>
                `;
            });

            document.getElementById('recommendations-area').innerHTML = html;
        }

        async function executeCommand() {
            const input = document.getElementById('command-input');
            const command = input.value.trim().toLowerCase();

            if (!command) return;

            const responseArea = document.getElementById('response-area');
            responseArea.innerHTML = '<div class="loading"><div class="spinner"></div>Processing command...</div>';

            try {
                let result = await processCommand(command);
                displayResponse(result);
            } catch (error) {
                responseArea.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        async function processCommand(command) {
            // Revenue commands
            if (command.includes('revenue') || command.includes('money') || command.includes('income')) {
                const response = await fetch(`${API_BASE}/analytics/dashboard`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                return {
                    type: 'revenue',
                    data: data.revenue,
                    summary: `Total revenue: $${data.revenue.total_revenue}. MRR: $${data.revenue.mrr}. PT revenue: $${data.revenue.pt_revenue}.`
                };
            }

            // Lead commands
            if (command.includes('lead') || command.includes('prospect')) {
                const response = await fetch(`${API_BASE}/leads`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const leads = await response.json();
                return {
                    type: 'leads',
                    data: leads,
                    summary: `Found ${leads.length} leads. ${leads.filter(l => l.stage === 'new').length} new, ${leads.filter(l => l.stage === 'trial_booked').length} trials booked.`
                };
            }

            // Performance commands
            if (command.includes('perform') || command.includes('top') || command.includes('best')) {
                const response = await fetch(`${API_BASE}/analytics/dashboard`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                return {
                    type: 'performance',
                    data: data,
                    summary: `System performance: ${data.leads.total_leads} leads, ${data.members.active_members} active members, $${data.revenue.total_revenue} revenue.`
                };
            }

            // Stock commands
            if (command.includes('stock') || command.includes('inventory') || command.includes('product')) {
                const response = await fetch(`${API_BASE}/stock/alerts`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const alerts = await response.json();
                return {
                    type: 'stock',
                    data: alerts,
                    summary: `${alerts.length} stock alerts. ${alerts.filter(a => a.status === 'active').length} active.`
                };
            }

            // Member commands
            if (command.includes('member') || command.includes('customer') || command.includes('risk')) {
                const response = await fetch(`${API_BASE}/analytics/dashboard`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                return {
                    type: 'members',
                    data: data.members,
                    summary: `${data.members.active_members} active members out of ${data.members.total_members} total.`
                };
            }

            // Funnel commands
            if (command.includes('funnel') || command.includes('conversion')) {
                const response = await fetch(`${API_BASE}/analytics/funnel`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const funnel = await response.json();
                return {
                    type: 'funnel',
                    data: funnel,
                    summary: `Conversion funnel: ${funnel.leads_created} leads → ${funnel.trials_booked} trials → ${funnel.converted} converted (${funnel.overall_conversion_rate}%).`
                };
            }

            return {
                type: 'unknown',
                summary: 'Command not recognized. Try: revenue trends, show leads, top performers, stock alerts, conversion funnel.'
            };
        }

        function displayResponse(result) {
            const responseArea = document.getElementById('response-area');
            let html = '';

            if (result.summary) {
                html += `<div class="response-item">
                    <div class="response-label">SUMMARY</div>
                    <div class="response-value">${result.summary}</div>
                </div>`;
            }

            if (result.data) {
                if (Array.isArray(result.data)) {
                    html += `<div class="response-item">
                        <div class="response-label">RESULTS (${result.data.length} items)</div>
                        <div class="response-value" style="max-height: 200px; overflow-y: auto; font-size: 12px; font-family: monospace;">
                            ${JSON.stringify(result.data, null, 2)}
                        </div>
                    </div>`;
                } else {
                    for (const [key, value] of Object.entries(result.data)) {
                        html += `<div class="response-item">
                            <div class="response-label">${key.replace(/_/g, ' ').toUpperCase()}</div>
                            <div class="response-value">${typeof value === 'object' ? JSON.stringify(value) : value}</div>
                        </div>`;
                    }
                }
            }

            responseArea.innerHTML = html;
        }

        function setCommand(cmd) {
            document.getElementById('command-input').value = cmd;
            executeCommand();
        }

        function showError(message) {
            document.getElementById('metrics-grid').innerHTML = `<div class="error">${message}</div>`;
        }

        document.getElementById('command-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') executeCommand();
        });

        autoLogin();
    </script>
</body>
</html>
