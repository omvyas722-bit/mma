<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://localhost:*; img-src 'self' data:;">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <script defer src="/public/shared-auth.js"></script>
    <title>ROAR MMA - AI Command Center</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #222;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #ff4444;
        }

        .status {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff00;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Command Center */
        .command-center {
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .command-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #fff;
        }

        .command-input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .command-input {
            width: 100%;
            padding: 16px 50px 16px 20px;
            background: #000;
            border: 2px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }

        .command-input:focus {
            outline: none;
            border-color: #ff4444;
            box-shadow: 0 0 0 3px rgba(255, 68, 68, 0.1);
        }

        .command-submit {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: #ff4444;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .command-submit:hover {
            background: #ff6666;
        }

        .suggestions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .suggestion-chip {
            padding: 8px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .suggestion-chip:hover {
            background: #222;
            border-color: #ff4444;
        }

        /* Response Area */
        .response-area {
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 20px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .response-item {
            margin-bottom: 15px;
            padding: 15px;
            background: #1a1a1a;
            border-left: 3px solid #ff4444;
            border-radius: 4px;
        }

        .response-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .response-value {
            font-size: 16px;
            color: #fff;
        }

        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }

        .metric-card:hover {
            border-color: #ff4444;
            transform: translateY(-2px);
        }

        .metric-label {
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .metric-change {
            font-size: 13px;
            color: #00ff00;
        }

        .metric-change.negative {
            color: #ff4444;
        }

        /* Systems Status */
        .systems-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .system-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
        }

        .system-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .system-name {
            font-size: 16px;
            font-weight: 600;
        }

        .system-status {
            padding: 4px 12px;
            background: #00ff0020;
            color: #00ff00;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .system-metrics {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .system-metric {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .system-metric-label {
            color: #888;
        }

        .system-metric-value {
            color: #fff;
            font-weight: 600;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .spinner {
            border: 3px solid #333;
            border-top: 3px solid #ff4444;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error */
        .error {
            background: #ff444420;
            border: 1px solid #ff4444;
            border-radius: 8px;
            padding: 20px;
            color: #ff4444;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">⚡ ROAR MMA Command Center</div>
            <div class="status">
                <div class="status-item">
                    <div class="status-dot"></div>
                    <span id="server-status">Connecting...</span>
                </div>
                <div class="status-item">
                    <span id="current-time"></span>
                </div>
            </div>
        </div>

        <!-- AI Command Center -->
        <div class="command-center">
            <div class="command-title">🤖 AI Command Center</div>
            <div class="command-input-wrapper">
                <input
                    type="text"
                    class="command-input"
                    id="command-input"
                    placeholder="Ask anything... e.g., 'show all leads', 'revenue this month', 'members at risk'"
                    autocomplete="off"
                >
                <button class="command-submit" >Execute</button>
            </div>
            <div class="suggestions">
                <div class="suggestion-chip" >Show all leads</div>
                <div class="suggestion-chip" >Revenue this month</div>
                <div class="suggestion-chip" >Members at risk</div>
                <div class="suggestion-chip" >Stock alerts</div>
                <div class="suggestion-chip" >PT sessions today</div>
            </div>
            <div class="response-area" id="response-area">
                <div style="text-align: center; color: #666; padding: 40px;">
                    Type a command or click a suggestion to get started
                </div>
            </div>
        </div>

        <!-- Live Metrics -->
        <div class="metrics-grid" id="metrics-grid">
            <div class="loading">
                <div class="spinner"></div>
                Loading live metrics...
            </div>
        </div>

        <!-- Systems Status -->
        <div class="systems-grid" id="systems-grid">
            <div class="loading">
                <div class="spinner"></div>
                Loading systems status...
            </div>
        </div>
    </div>

    <script>
        var API_BASE = RoarMMA.API_BASE;
        

        // Update time
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleTimeString();
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Auto-login
        async function autoLogin() {
            if (!RoarMMA.requireAuth()) return;
            try {
                document.getElementById('server-status').textContent = 'Connected';
                    loadDashboard();
                } else {
                    throw new Error('Login failed');
                }
            } catch (error) {
                document.getElementById('server-status').textContent = 'Offline';
                showError('Cannot connect to server. Make sure backend is running on port 3001.');
            }
        }

        // Load dashboard data
        async function loadDashboard() {
            await Promise.all([
                loadMetrics(),
                loadSystems()
            ]);
        }

        // Load metrics
        async function loadMetrics() {
            try {
                const response = await fetch(`${API_BASE}/analytics/dashboard`, {
                    headers: { 'Authorization': 'Bearer ' + RoarMMA.getToken() }
                });

                if (!response.ok) throw new Error('Failed to load metrics');

                const data = await response.json();

                const metricsHTML = `
                    <div class="metric-card">
                        <div class="metric-label">Total Revenue</div>
                        <div class="metric-value">$${data.revenue.total_revenue || 0}</div>
                        <div class="metric-change">MRR: $${data.revenue.mrr || 0}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Active Members</div>
                        <div class="metric-value">${data.members.active_members || 0}</div>
                        <div class="metric-change">Total: ${data.members.total_members || 0}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Total Leads</div>
                        <div class="metric-value">${data.leads.total_leads || 0}</div>
                        <div class="metric-change">Conversion: ${data.leads.conversion_rate || 0}%</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">PT Revenue</div>
                        <div class="metric-value">$${data.revenue.pt_revenue || 0}</div>
                        <div class="metric-change">Sessions: ${data.pt_sessions?.total_sessions || 0}</div>
                    </div>
                `;

                document.getElementById('metrics-grid').innerHTML = metricsHTML;
            } catch (error) {
                document.getElementById('metrics-grid').innerHTML = '<div class="error">Failed to load metrics</div>';
            }
        }

        // Load systems status
        async function loadSystems() {
            const systems = [
                { name: 'Lead Nurturing', endpoint: '/leads', metric: 'Total Leads' },
                { name: 'Trial Conversion', endpoint: '/leads?stage=trial_booked', metric: 'Trials Booked' },
                { name: 'PT Sessions', endpoint: '/pt-sessions', metric: 'Total Sessions' },
                { name: 'Stock Management', endpoint: '/stock/products', metric: 'Products' },
                { name: 'Belt Grading', endpoint: '/grading/belts', metric: 'Belt Levels' },
                { name: 'Retention', endpoint: '/retention/analytics', metric: 'Requests' }
            ];

            let systemsHTML = '';

            for (const system of systems) {
                try {
                const response = await fetch(`${API_BASE}${system.endpoint}`, {
                        headers: { 'Authorization': 'Bearer ' + RoarMMA.getToken() }
                    });

                    const data = await response.json();
                    const count = Array.isArray(data) ? data.length : (data.total_requests !== undefined ? data.total_requests : Object.keys(data).length);

                    systemsHTML += `
                        <div class="system-card">
                            <div class="system-header">
                                <div class="system-name">${system.name}</div>
                                <div class="system-status">ACTIVE</div>
                            </div>
                            <div class="system-metrics">
                                <div class="system-metric">
                                    <span class="system-metric-label">${system.metric}</span>
                                    <span class="system-metric-value">${count}</span>
                                </div>
                                <div class="system-metric">
                                    <span class="system-metric-label">Status</span>
                                    <span class="system-metric-value" style="color: #00ff00;">Operational</span>
                                </div>
                            </div>
                        </div>
                    `;
                } catch (error) {
                    systemsHTML += `
                        <div class="system-card">
                            <div class="system-header">
                                <div class="system-name">${system.name}</div>
                                <div class="system-status" style="background: #ff444420; color: #ff4444;">ERROR</div>
                            </div>
                        </div>
                    `;
                }
            }

            document.getElementById('systems-grid').innerHTML = systemsHTML;
        }

        // Execute command
        async function executeCommand() {
            const input = document.getElementById('command-input');
            const command = input.value.trim().toLowerCase();

            if (!command) return;

            const responseArea = document.getElementById('response-area');
            responseArea.innerHTML = '<div class="loading"><div class="spinner"></div>Processing command...</div>';

            try {
                let result = await processCommand(command);
                displayResponse(result);
            } catch (error) {
                responseArea.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        // Process command
        async function processCommand(command) {
            // Lead commands
            if (command.includes('lead')) {
                const response = await fetch(`${API_BASE}/leads`, {
                    headers: { 'Authorization': 'Bearer ' + RoarMMA.getToken() }
                });
                return await response.json();
            }

            // Revenue commands
            if (command.includes('revenue')) {
                const response = await fetch(`${API_BASE}/analytics/dashboard`, {
                    headers: { 'Authorization': 'Bearer ' + RoarMMA.getToken() }
                });
                const data = await response.json();
                return data.revenue;
            }

            // Stock commands
            if (command.includes('stock')) {
                const response = await fetch(`${API_BASE}/stock/alerts`, {
                    headers: { 'Authorization': 'Bearer ' + RoarMMA.getToken() }
                });
                return await response.json();
            }

            // PT commands
            if (command.includes('pt') || command.includes('session')) {
                const response = await fetch(`${API_BASE}/pt-sessions`, {
                    headers: { 'Authorization': 'Bearer ' + RoarMMA.getToken() }
                });
                return await response.json();
            }

            // Member commands
            if (command.includes('member')) {
                const response = await fetch(`${API_BASE}/analytics/dashboard`, {
                    headers: { 'Authorization': 'Bearer ' + RoarMMA.getToken() }
                });
                const data = await response.json();
                return data.members;
            }

            return { message: 'Command not recognized. Try: show leads, revenue, stock alerts, pt sessions, or members' };
        }

        // Display response
        function displayResponse(data) {
            const responseArea = document.getElementById('response-area');
            let html = '';

            if (Array.isArray(data)) {
                html = `<div class="response-item">
                    <div class="response-label">Results (${data.length} items)</div>
                    <div class="response-value">${JSON.stringify(data, null, 2)}</div>
                </div>`;
            } else {
                for (const [key, value] of Object.entries(data)) {
                    html += `<div class="response-item">
                        <div class="response-label">${key.replace(/_/g, ' ').toUpperCase()}</div>
                        <div class="response-value">${typeof value === 'object' ? JSON.stringify(value, null, 2) : value}</div>
                    </div>`;
                }
            }

            responseArea.innerHTML = html;
        }

        // Set command from suggestion
        function setCommand(cmd) {
            document.getElementById('command-input').value = cmd;
            executeCommand();
        }

        // Show error
        function showError(message) {
            document.getElementById('metrics-grid').innerHTML = `<div class="error">${message}</div>`;
            document.getElementById('systems-grid').innerHTML = '';
        }

        // Enter key support
        document.getElementById('command-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') executeCommand();
        });

        // Initialize
        autoLogin();
    </script>
</body>
</html>
