<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <script defer src="/public/shared-auth.js"></script>
    <title>ROAR MMA - Add/Edit Lead</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; }

        .sidebar { position: fixed; left: 0; top: 0; width: 240px; height: 100vh; background: #0f0f0f; border-right: 1px solid #222; padding: 20px; z-index: 100; }
        .logo { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #ff4444 0%, #ff6666 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; }
        .nav-menu { display: flex; flex-direction: column; gap: 5px; }
        .nav-item { padding: 12px 16px; border-radius: 8px; cursor: pointer; transition: all 0.3s; font-size: 14px; }
        .nav-item:hover { background: #1a1a1a; }
        .nav-item.active { background: #ff444420; color: #ff4444; }

        .main-content { margin-left: 240px; padding: 20px; max-width: 1200px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { padding: 10px 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .back-btn:hover { border-color: #ff4444; }
        .header-title { font-size: 28px; font-weight: 700; }

        .form-container { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 30px; }
        .form-section { margin-bottom: 35px; }
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #333; }

        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .form-field { margin-bottom: 20px; }
        .form-field.full-width { grid-column: 1 / -1; }
        .form-label { display: block; font-size: 13px; color: #888; margin-bottom: 8px; font-weight: 600; }
        .form-label.required::after { content: ' *'; color: #ff4444; }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #ff4444;
        }
        .form-textarea { resize: vertical; min-height: 100px; }

        .radio-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .radio-option:hover { border-color: #ff4444; }
        .radio-option input { cursor: pointer; }

        .form-actions { display: flex; gap: 15px; justify-content: flex-end; padding-top: 20px; border-top: 1px solid #333; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; font-size: 14px; }
        .btn-primary { background: #ff4444; color: #fff; }
        .btn-primary:hover { background: #ff6666; }
        .btn-secondary { background: #1a1a1a; border: 1px solid #333; color: #fff; }
        .btn-secondary:hover { border-color: #ff4444; }

        .form-hint { font-size: 12px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">⚡ ROAR MMA</div>
        <div class="nav-menu">
            <div class="nav-item" >📊 Dashboard</div>
            <div class="nav-item" >🤖 AI Command</div>
            <div class="nav-item" >⚙️ Workflows</div>
            <div class="nav-item" >📅 Classes</div>
            <div class="nav-item" >🥋 Belt Progression</div>
            <div class="nav-item" >✅ Check-In</div>
            <div class="nav-item" >⚠️ Retention</div>
            <div class="nav-item" >💳 Billing</div>
            <div class="nav-item" >👥 Members</div>
            <div class="nav-item active" >📞 Leads</div>
            <div class="nav-item" >🏋️ PT Sessions</div>
            <div class="nav-item" >📦 Stock</div>
        </div>
    </div>

    <div class="main-content" role="main" aria-label="Main content">
        <div class="header">
            <div class="header-left">
                <button class="back-btn" >← Back</button>
                <div class="header-title" id="page-title">Add New Lead</div>
            </div>
        </div>

        <form class="form-container" id="lead-form" >
            <div class="form-section">
                <div class="section-title">Contact Information</div>
                <div class="form-grid">
                    <div class="form-field">
                        <label class="form-label required">First Name</label>
                        <input type="text" class="form-input" name="first_name" required>
                    </div>
                    <div class="form-field">
                        <label class="form-label required">Last Name</label>
                        <input type="text" class="form-input" name="last_name" required>
                    </div>
                    <div class="form-field">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" name="email">
                        <div class="form-hint">Optional but recommended for follow-up</div>
                    </div>
                    <div class="form-field">
                        <label class="form-label required">Phone</label>
                        <input type="tel" class="form-input" name="phone" required placeholder="0400000000">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="section-title">Lead Details</div>
                <div class="form-grid">
                    <div class="form-field">
                        <label class="form-label required">Lead Source</label>
                        <select class="form-select" name="source" required>
                            <option value="">Select source...</option>
                            <option value="website">Website</option>
                            <option value="facebook">Facebook</option>
                            <option value="instagram">Instagram</option>
                            <option value="google">Google Ads</option>
                            <option value="referral">Referral</option>
                            <option value="walk_in">Walk-in</option>
                            <option value="phone">Phone Inquiry</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label class="form-label required">Current Stage</label>
                        <select class="form-select" name="stage" required>
                            <option value="new">New</option>
                            <option value="contacted">Contacted</option>
                            <option value="trial_booked">Trial Booked</option>
                            <option value="trial_completed">Trial Completed</option>
                            <option value="converted">Converted</option>
                            <option value="lost">Lost</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label class="form-label">Interest Level</label>
                        <select class="form-select" name="interest_level">
                            <option value="">Select...</option>
                            <option value="high">High - Ready to join</option>
                            <option value="medium">Medium - Interested</option>
                            <option value="low">Low - Just browsing</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label class="form-label">Preferred Contact Method</label>
                        <select class="form-select" name="preferred_contact">
                            <option value="">Select...</option>
                            <option value="phone">Phone</option>
                            <option value="email">Email</option>
                            <option value="sms">SMS</option>
                            <option value="whatsapp">WhatsApp</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="section-title">Interests & Goals</div>
                <div class="form-grid">
                    <div class="form-field full-width">
                        <label class="form-label">What are they interested in?</label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="checkbox" name="interest_bjj" value="1">
                                <span>Brazilian Jiu-Jitsu</span>
                            </label>
                            <label class="radio-option">
                                <input type="checkbox" name="interest_mma" value="1">
                                <span>MMA</span>
                            </label>
                            <label class="radio-option">
                                <input type="checkbox" name="interest_boxing" value="1">
                                <span>Boxing</span>
                            </label>
                            <label class="radio-option">
                                <input type="checkbox" name="interest_muay_thai" value="1">
                                <span>Muay Thai</span>
                            </label>
                            <label class="radio-option">
                                <input type="checkbox" name="interest_fitness" value="1">
                                <span>Fitness</span>
                            </label>
                            <label class="radio-option">
                                <input type="checkbox" name="interest_kids" value="1">
                                <span>Kids Classes</span>
                            </label>
                        </div>
                    </div>
                    <div class="form-field full-width">
                        <label class="form-label">Goals & Motivation</label>
                        <textarea class="form-textarea" name="goals" placeholder="What are their fitness goals? Why are they interested in martial arts?"></textarea>
                    </div>
                    <div class="form-field full-width">
                        <label class="form-label">Experience Level</label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="experience" value="beginner">
                                <span>Beginner - No experience</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="experience" value="intermediate">
                                <span>Intermediate - Some experience</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="experience" value="advanced">
                                <span>Advanced - Experienced</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="section-title">Trial Class Details</div>
                <div class="form-grid">
                    <div class="form-field">
                        <label class="form-label">Trial Date</label>
                        <input type="date" class="form-input" name="trial_date">
                    </div>
                    <div class="form-field">
                        <label class="form-label">Trial Time</label>
                        <input type="time" class="form-input" name="trial_time">
                    </div>
                    <div class="form-field full-width">
                        <label class="form-label">Trial Class Type</label>
                        <select class="form-select" name="trial_class">
                            <option value="">Not scheduled yet</option>
                            <option value="bjj_fundamentals">BJJ Fundamentals</option>
                            <option value="bjj_advanced">BJJ Advanced</option>
                            <option value="mma_basics">MMA Basics</option>
                            <option value="boxing">Boxing</option>
                            <option value="muay_thai">Muay Thai</option>
                            <option value="kids_class">Kids Class</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="section-title">Additional Information</div>
                <div class="form-grid">
                    <div class="form-field full-width">
                        <label class="form-label">Referral Details</label>
                        <input type="text" class="form-input" name="referral_details" placeholder="If referred by someone, who?">
                    </div>
                    <div class="form-field full-width">
                        <label class="form-label">Notes</label>
                        <textarea class="form-textarea" name="notes" placeholder="Any additional notes about this lead..."></textarea>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn btn-secondary" >Cancel</button>
                <button type="submit" class="btn btn-primary">Save Lead</button>
            </div>
        </form>
    </div>

    <script>
        const API_BASE = RoarMMA.API_BASE;
        
        let leadId = null;
        let isEditMode = false;

        async function init() {
            const params = new URLSearchParams(window.location.search);
            leadId = params.get('id');
            isEditMode = !!leadId;

            if (isEditMode) {
                document.getElementById('page-title').textContent = 'Edit Lead';
            }

            if (!RoarMMA.requireAuth()) return;
            document.getElementById('lead-form')?.addEventListener('submit', handleSubmit);
            try {
                if (isEditMode) {
                    await loadLeadData();
                }
            } catch (error) {
                // Log suppressed
            }
        }

        async function loadLeadData() {
            try {
                const response = await fetch(`${API_BASE}/leads`, {
                    headers: { 'Authorization': 'Bearer ' + RoarMMA.getToken() }
                });
                const leads = await response.json();
                const lead = leads.find(l => l.id == leadId);

                if (lead) {
                    const form = document.getElementById('lead-form');
                    form.first_name.value = lead.first_name || '';
                    form.last_name.value = lead.last_name || '';
                    form.email.value = lead.email || '';
                    form.phone.value = lead.phone || '';
                    form.source.value = lead.source || '';
                    form.stage.value = lead.stage || 'new';
                    form.interest_level.value = lead.interest_level || '';
                    form.notes.value = lead.notes || '';
                }
            } catch (error) {
                // Log suppressed
            }
        }

        async function handleSubmit(event) {
            event.preventDefault();

            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData.entries());

            // Collect checkbox interests
            const interests = [];
            if (data.interest_bjj) interests.push('BJJ');
            if (data.interest_mma) interests.push('MMA');
            if (data.interest_boxing) interests.push('Boxing');
            if (data.interest_muay_thai) interests.push('Muay Thai');
            if (data.interest_fitness) interests.push('Fitness');
            if (data.interest_kids) interests.push('Kids');

            data.interests = interests.join(', ');

            // Remove checkbox fields
            delete data.interest_bjj;
            delete data.interest_mma;
            delete data.interest_boxing;
            delete data.interest_muay_thai;
            delete data.interest_fitness;
            delete data.interest_kids;

            try {
                const url = isEditMode ? `${API_BASE}/leads/${leadId}` : `${API_BASE}/leads`;
                const method = isEditMode ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Authorization': 'Bearer ' + RoarMMA.getToken(),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert(`Lead ${isEditMode ? 'updated' : 'created'} successfully!`);
                    window.location.href = 'leads.html';
                } else {
                    const error = await response.json();
                    alert(`Failed to save lead: ${error.message || 'Unknown error'}`);
                }
            } catch (error) {
                // Log suppressed
                alert('Error saving lead. Please try again.');
            }
        }

        init();
    </script>
</body>
</html>
