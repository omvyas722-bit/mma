<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <script defer src="/public/shared-auth.js"></script>
    <title>ROAR MMA - Member Profile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; }

        .sidebar { position: fixed; left: 0; top: 0; width: 240px; height: 100vh; background: #0f0f0f; border-right: 1px solid #222; padding: 20px; z-index: 100; }
        .logo { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #ff4444 0%, #ff6666 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; }
        .nav-menu { display: flex; flex-direction: column; gap: 5px; }
        .nav-item { padding: 12px 16px; border-radius: 8px; cursor: pointer; transition: all 0.3s; font-size: 14px; }
        .nav-item:hover { background: #1a1a1a; }
        .nav-item.active { background: #ff444420; color: #ff4444; }

        .main-content { margin-left: 240px; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { padding: 10px 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .back-btn:hover { border-color: #ff4444; }
        .header-title { font-size: 28px; font-weight: 700; }
        .header-actions { display: flex; gap: 10px; }

        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-primary { background: #ff4444; color: #fff; }
        .btn-primary:hover { background: #ff6666; }
        .btn-secondary { background: #1a1a1a; border: 1px solid #333; color: #fff; }

        .profile-header { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 30px; margin-bottom: 20px; }
        .profile-top { display: flex; justify-content: space-between; align-items: start; margin-bottom: 25px; }
        .profile-info { flex: 1; }
        .profile-name { font-size: 32px; font-weight: 700; margin-bottom: 10px; }
        .profile-meta { display: flex; gap: 20px; font-size: 14px; color: #888; }
        .status-badge { padding: 6px 16px; border-radius: 16px; font-size: 13px; font-weight: 600; }
        .status-active { background: #00ff0020; color: #00ff00; }
        .status-inactive { background: #88888820; color: #888; }

        .quick-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .quick-stat { text-align: center; }
        .quick-stat-value { font-size: 24px; font-weight: 700; color: #ff4444; }
        .quick-stat-label { font-size: 12px; color: #666; margin-top: 5px; }

        .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 25px; }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; }

        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .info-field { margin-bottom: 15px; }
        .info-label { font-size: 13px; color: #888; margin-bottom: 5px; }
        .info-value { font-size: 15px; color: #fff; }

        .timeline { display: flex; flex-direction: column; gap: 15px; }
        .timeline-item { background: #0a0a0a; border: 1px solid #222; border-radius: 8px; padding: 15px; }
        .timeline-date { font-size: 12px; color: #666; margin-bottom: 5px; }
        .timeline-title { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
        .timeline-desc { font-size: 13px; color: #888; }

        .session-list { display: flex; flex-direction: column; gap: 12px; }
        .session-item { background: #0a0a0a; border: 1px solid #222; border-radius: 8px; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .session-info { flex: 1; }
        .session-date { font-size: 13px; font-weight: 600; }
        .session-coach { font-size: 12px; color: #888; margin-top: 3px; }
        .session-amount { font-size: 16px; font-weight: 700; color: #00ff00; }

        .payment-list { display: flex; flex-direction: column; gap: 12px; }
        .payment-item { background: #0a0a0a; border: 1px solid #222; border-radius: 8px; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .payment-info { flex: 1; }
        .payment-date { font-size: 13px; font-weight: 600; }
        .payment-desc { font-size: 12px; color: #888; margin-top: 3px; }
        .payment-amount { font-size: 16px; font-weight: 700; color: #00ff00; }

        .loading { text-align: center; padding: 40px; color: #666; }
        .spinner { border: 3px solid #333; border-top: 3px solid #ff4444; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .empty-state { text-align: center; padding: 40px; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">⚡ ROAR MMA</div>
        <div class="nav-menu">
            <div class="nav-item" >📊 Dashboard</div>
            <div class="nav-item" >🤖 AI Command</div>
            <div class="nav-item" >⚙️ Workflows</div>
            <div class="nav-item" >📅 Classes</div>
            <div class="nav-item" >🥋 Belt Progression</div>
            <div class="nav-item" >✅ Check-In</div>
            <div class="nav-item" >⚠️ Retention</div>
            <div class="nav-item" >💳 Billing</div>
            <div class="nav-item active" >👥 Members</div>
            <div class="nav-item" >📞 Leads</div>
            <div class="nav-item" >🏋️ PT Sessions</div>
            <div class="nav-item" >📦 Stock</div>
        </div>
    </div>

    <div class="main-content" role="main" aria-label="Main content">
        <div class="header">
            <div class="header-left">
                <button class="back-btn" >← Back</button>
                <div class="header-title" id="page-title">Member Profile</div>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" >💬 Message</button>
                <button class="btn btn-secondary" >🏋️ Book PT</button>
                <button class="btn btn-primary" >✏️ Edit</button>
            </div>
        </div>

        <div class="profile-header" id="profile-header">
            <div class="loading"><div class="spinner"></div>Loading member...</div>
        </div>

        <div class="content-grid">
            <div>
                <div class="card" style="margin-bottom: 20px;">
                    <div class="card-title">Contact & Membership Info</div>
                    <div class="info-grid" id="member-info">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Recent Activity</div>
                    <div class="timeline" id="activity-timeline">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>
            </div>

            <div>
                <div class="card" style="margin-bottom: 20px;">
                    <div class="card-title">Upcoming PT Sessions</div>
                    <div class="session-list" id="upcoming-sessions">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Recent Payments</div>
                    <div class="payment-list" id="recent-payments">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = RoarMMA.API_BASE;
        
        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        
        let memberId = null;
        let memberData = null;

        async function init() {
            // Get member ID from URL
            const params = new URLSearchParams(window.location.search);
            memberId = params.get('id') || 1;

            if (!RoarMMA.requireAuth()) return;
            try {
                await Promise.all([
                    loadMemberProfile(),
                    loadMemberInfo(),
                    loadActivity(),
                    loadUpcomingSessions(),
                    loadRecentPayments()
                ]);
            } catch (error) {
                // Log suppressed
            }
        }

        async function loadMemberProfile() {
            try {
                // For now, use sample data since we don't have a member detail endpoint
                memberData = {
                    id: memberId,
                    first_name: 'John',
                    last_name: 'Smith',
                    email: 'john.smith@example.com',
                    phone: '0412345678',
                    status: 'active',
                    plan: 'unlimited',
                    joined_date: '2026-01-15',
                    total_checkins: 45,
                    pt_sessions: 8,
                    belt_rank: 'Blue Belt'
                };

                document.getElementById('page-title').textContent = `${memberData.first_name} ${memberData.last_name}`;

                const statusClass = `status-${memberData.status}`;
                const joinedDate = new Date(memberData.joined_date).toLocaleDateString();
                const memberSince = Math.floor((new Date() - new Date(memberData.joined_date)) / (1000 * 60 * 60 * 24));

                document.getElementById('profile-header').innerHTML = `
                    <div class="profile-top">
                        <div class="profile-info">
                            <div class="profile-name">${escapeHtml(memberData.first_name)} ${escapeHtml(memberData.last_name)}</div>
                            <div class="profile-meta">
                                <span>📧 ${escapeHtml(memberData.email)}</span>
                                <span>📱 ${escapeHtml(memberData.phone)}</span>
                                <span>📅 Joined ${escapeHtml(joinedDate)}</span>
                                <span>⏱️ ${escapeHtml(memberSince)} days</span>
                            </div>
                        </div>
                        <span class="status-badge ${escapeHtml(statusClass)}">${escapeHtml(memberData.status.toUpperCase())}</span>
                    </div>
                    <div class="quick-stats">
                        <div class="quick-stat">
                            <div class="quick-stat-value">${escapeHtml(memberData.total_checkins)}</div>
                            <div class="quick-stat-label">Total Check-ins</div>
                        </div>
                        <div class="quick-stat">
                            <div class="quick-stat-value">${escapeHtml(memberData.pt_sessions)}</div>
                            <div class="quick-stat-label">PT Sessions</div>
                        </div>
                        <div class="quick-stat">
                            <div class="quick-stat-value">${escapeHtml(memberData.belt_rank)}</div>
                            <div class="quick-stat-label">Current Belt</div>
                        </div>
                        <div class="quick-stat">
                            <div class="quick-stat-value">${escapeHtml(memberData.plan)}</div>
                            <div class="quick-stat-label">Membership Plan</div>
                        </div>
                    </div>
                `;
            } catch (error) {
                // Log suppressed
            }
        }

        async function loadMemberInfo() {
            try {
                document.getElementById('member-info').innerHTML = `
                    <div class="info-field">
                        <div class="info-label">Email Address</div>
                        <div class="info-value">${escapeHtml(memberData.email)}</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Phone Number</div>
                        <div class="info-value">${escapeHtml(memberData.phone)}</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Membership Status</div>
                        <div class="info-value">${escapeHtml(memberData.status)}</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Current Plan</div>
                        <div class="info-value">${escapeHtml(memberData.plan)}</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Join Date</div>
                        <div class="info-value">${escapeHtml(new Date(memberData.joined_date).toLocaleDateString())}</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Belt Rank</div>
                        <div class="info-value">${escapeHtml(memberData.belt_rank)}</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Emergency Contact</div>
                        <div class="info-value">Jane Smith - 0498765432</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Medical Notes</div>
                        <div class="info-value">None</div>
                    </div>
                `;
            } catch (error) {
                // Log suppressed
            }
        }

        async function loadActivity() {
            try {
                // Sample activity data
                const activities = [
                    { date: '2026-05-13', title: 'Class Check-in', desc: 'BJJ Fundamentals - 6:00 PM' },
                    { date: '2026-05-11', title: 'PT Session Completed', desc: 'With Coach Mike - $80' },
                    { date: '2026-05-10', title: 'Class Check-in', desc: 'MMA Sparring - 7:00 PM' },
                    { date: '2026-05-08', title: 'Payment Received', desc: 'Monthly Membership - $199' },
                    { date: '2026-05-06', title: 'Class Check-in', desc: 'BJJ Advanced - 6:00 PM' }
                ];

                let html = '';
                activities.forEach(activity => {
                    html += `
                        <div class="timeline-item">
                            <div class="timeline-date">${escapeHtml(new Date(activity.date).toLocaleDateString())}</div>
                            <div class="timeline-title">${escapeHtml(activity.title)}</div>
                            <div class="timeline-desc">${escapeHtml(activity.desc)}</div>
                        </div>
                    `;
                });

                document.getElementById('activity-timeline').innerHTML = html;
            } catch (error) {
                // Log suppressed
            }
        }

        async function loadUpcomingSessions() {
            try {
                const response = await fetch(`${API_BASE}/pt-sessions`, {
                    headers: { 'Authorization': 'Bearer ' + RoarMMA.getToken() }
                });
                const sessions = await response.json();

                const upcoming = sessions.filter(s =>
                    s.status === 'scheduled' &&
                    new Date(s.scheduled_date) >= new Date()
                ).slice(0, 5);

                if (upcoming.length === 0) {
                    document.getElementById('upcoming-sessions').innerHTML = `
                        <div class="empty-state">No upcoming sessions</div>
                    `;
                    return;
                }

                let html = '';
                upcoming.forEach(session => {
                    const date = new Date(session.scheduled_date).toLocaleDateString();
                    html += `
                        <div class="session-item">
                            <div class="session-info">
                                <div class="session-date">${escapeHtml(date)} at ${escapeHtml(session.scheduled_time)}</div>
                                <div class="session-coach">Coach #${escapeHtml(session.coach_id)} - ${escapeHtml(session.duration_minutes)}min</div>
                            </div>
                            <div class="session-amount">$${escapeHtml(session.amount)}</div>
                        </div>
                    `;
                });

                document.getElementById('upcoming-sessions').innerHTML = html;
            } catch (error) {
                // Log suppressed
                document.getElementById('upcoming-sessions').innerHTML = `
                    <div class="empty-state">No upcoming sessions</div>
                `;
            }
        }

        async function loadRecentPayments() {
            try {
                // Sample payment data
                const payments = [
                    { date: '2026-05-08', desc: 'Monthly Membership', amount: 199 },
                    { date: '2026-05-11', desc: 'PT Session', amount: 80 },
                    { date: '2026-04-08', desc: 'Monthly Membership', amount: 199 },
                    { date: '2026-04-15', desc: 'PT Session', amount: 80 },
                    { date: '2026-03-08', desc: 'Monthly Membership', amount: 199 }
                ];

                let html = '';
                payments.forEach(payment => {
                    html += `
                        <div class="payment-item">
                            <div class="payment-info">
                                <div class="payment-date">${escapeHtml(new Date(payment.date).toLocaleDateString())}</div>
                                <div class="payment-desc">${escapeHtml(payment.desc)}</div>
                            </div>
                            <div class="payment-amount">$${escapeHtml(payment.amount)}</div>
                        </div>
                    `;
                });

                document.getElementById('recent-payments').innerHTML = html;
            } catch (error) {
                // Log suppressed
            }
        }

        init();
    </script>
</body>
</html>
