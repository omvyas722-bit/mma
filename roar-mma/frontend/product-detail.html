<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROAR MMA - Product Details</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; }

        .sidebar { position: fixed; left: 0; top: 0; width: 240px; height: 100vh; background: #0f0f0f; border-right: 1px solid #222; padding: 20px; z-index: 100; }
        .logo { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #ff4444 0%, #ff6666 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; }
        .nav-menu { display: flex; flex-direction: column; gap: 5px; }
        .nav-item { padding: 12px 16px; border-radius: 8px; cursor: pointer; transition: all 0.3s; font-size: 14px; }
        .nav-item:hover { background: #1a1a1a; }
        .nav-item.active { background: #ff444420; color: #ff4444; }

        .main-content { margin-left: 240px; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { padding: 10px 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .back-btn:hover { border-color: #ff4444; }
        .header-title { font-size: 28px; font-weight: 700; }
        .header-actions { display: flex; gap: 10px; }

        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-primary { background: #ff4444; color: #fff; }
        .btn-primary:hover { background: #ff6666; }
        .btn-secondary { background: #1a1a1a; border: 1px solid #333; color: #fff; }
        .btn-danger { background: #ff444420; border: 1px solid #ff4444; color: #ff4444; }

        .product-header { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 30px; margin-bottom: 20px; }
        .product-top { display: flex; justify-content: space-between; align-items: start; margin-bottom: 25px; }
        .product-info { flex: 1; }
        .product-name { font-size: 32px; font-weight: 700; margin-bottom: 10px; }
        .product-meta { display: flex; gap: 20px; font-size: 14px; color: #888; flex-wrap: wrap; }

        .stock-badge { padding: 8px 20px; border-radius: 16px; font-size: 14px; font-weight: 600; }
        .stock-good { background: #00ff0020; color: #00ff00; }
        .stock-low { background: #ff880020; color: #ff8800; }
        .stock-out { background: #ff444420; color: #ff4444; }

        .quick-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .quick-stat { text-align: center; background: #0a0a0a; border: 1px solid #222; border-radius: 8px; padding: 15px; }
        .quick-stat-value { font-size: 24px; font-weight: 700; color: #ff4444; }
        .quick-stat-label { font-size: 12px; color: #666; margin-top: 5px; }

        .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; }

        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .info-field { margin-bottom: 15px; }
        .info-label { font-size: 13px; color: #888; margin-bottom: 5px; }
        .info-value { font-size: 15px; color: #fff; }

        .margin-display { background: #0a0a0a; border: 1px solid #222; border-radius: 8px; padding: 20px; }
        .margin-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #222; }
        .margin-row:last-child { border-bottom: none; margin-bottom: 0; }
        .margin-label { font-size: 14px; color: #888; }
        .margin-value { font-size: 18px; font-weight: 700; }

        .timeline { display: flex; flex-direction: column; gap: 15px; }
        .timeline-item { background: #0a0a0a; border: 1px solid #222; border-radius: 8px; padding: 15px; }
        .timeline-date { font-size: 12px; color: #666; margin-bottom: 5px; }
        .timeline-title { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
        .timeline-desc { font-size: 13px; color: #888; }

        .alert-banner { background: #ff880020; border: 1px solid #ff8800; border-radius: 12px; padding: 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .alert-icon { font-size: 32px; }
        .alert-content { flex: 1; }
        .alert-title { font-size: 16px; font-weight: 600; margin-bottom: 5px; color: #ff8800; }
        .alert-text { font-size: 14px; color: #ff8800; }

        .loading { text-align: center; padding: 40px; color: #666; }
        .spinner { border: 3px solid #333; border-top: 3px solid #ff4444; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">⚡ ROAR MMA</div>
        <div class="nav-menu">
            <div class="nav-item" onclick="window.location.href='dashboard.html'">📊 Dashboard</div>
            <div class="nav-item" onclick="window.location.href='command-center-v2.html'">🤖 AI Command</div>
            <div class="nav-item" onclick="window.location.href='workflow-builder.html'">⚙️ Workflows</div>
            <div class="nav-item" onclick="window.location.href='classes.html'">📅 Classes</div>
            <div class="nav-item" onclick="window.location.href='belt-progression.html'">🥋 Belt Progression</div>
            <div class="nav-item" onclick="window.location.href='checkin.html'">✅ Check-In</div>
            <div class="nav-item" onclick="window.location.href='retention.html'">⚠️ Retention</div>
            <div class="nav-item" onclick="window.location.href='billing.html'">💳 Billing</div>
            <div class="nav-item" onclick="window.location.href='members.html'">👥 Members</div>
            <div class="nav-item" onclick="window.location.href='leads.html'">📞 Leads</div>
            <div class="nav-item" onclick="window.location.href='pt-sessions.html'">🏋️ PT Sessions</div>
            <div class="nav-item active" onclick="window.location.href='stock.html'">📦 Stock</div>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="header-left">
                <button class="back-btn" onclick="window.location.href='stock.html'">← Back</button>
                <div class="header-title" id="page-title">Product Details</div>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="adjustStock()">📦 Adjust Stock</button>
                <button class="btn btn-secondary" onclick="recordSale()">💰 Record Sale</button>
                <button class="btn btn-primary" onclick="editProduct()">✏️ Edit</button>
            </div>
        </div>

        <div id="alert-container"></div>

        <div class="product-header" id="product-header">
            <div class="loading"><div class="spinner"></div>Loading product...</div>
        </div>

        <div class="content-grid">
            <div>
                <div class="card">
                    <div class="card-title">Product Information</div>
                    <div class="info-grid" id="product-info">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Pricing & Profitability</div>
                    <div class="margin-display" id="pricing-info">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Supplier Information</div>
                    <div class="info-grid" id="supplier-info">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>
            </div>

            <div>
                <div class="card">
                    <div class="card-title">Inventory Status</div>
                    <div id="inventory-status">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Recent Activity</div>
                    <div class="timeline" id="activity-timeline">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api';
        let authToken = null;
        let productId = null;
        let productData = null;

        async function init() {
            const params = new URLSearchParams(window.location.search);
            productId = params.get('id') || 1;

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'admin@roarmma.com.au', password: 'changeme123' })
                });
                const data = await response.json();
                authToken = data.token;

                await Promise.all([
                    loadProductHeader(),
                    loadProductInfo(),
                    loadPricingInfo(),
                    loadSupplierInfo(),
                    loadInventoryStatus(),
                    loadActivityTimeline()
                ]);
            } catch (error) {
                console.error('Init failed:', error);
            }
        }

        async function loadProductHeader() {
            try {
                const response = await fetch(`${API_BASE}/stock/products`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const products = await response.json();
                productData = products.find(p => p.id == productId) || products[0];

                document.getElementById('page-title').textContent = productData.name;

                const stockStatus = productData.stock_quantity === 0 ? 'out' :
                                  productData.stock_quantity <= productData.min_stock_level ? 'low' : 'good';
                const stockBadgeClass = `stock-${stockStatus}`;
                const stockText = productData.stock_quantity === 0 ? 'OUT OF STOCK' :
                                productData.stock_quantity <= productData.min_stock_level ? 'LOW STOCK' : 'IN STOCK';

                // Show alert if low/out of stock
                if (stockStatus !== 'good') {
                    document.getElementById('alert-container').innerHTML = `
                        <div class="alert-banner">
                            <div class="alert-icon">⚠️</div>
                            <div class="alert-content">
                                <div class="alert-title">${stockText}</div>
                                <div class="alert-text">Current stock: ${productData.stock_quantity} units. Minimum level: ${productData.min_stock_level} units.</div>
                            </div>
                            <button class="btn btn-primary" onclick="reorderProduct()">📦 Reorder</button>
                        </div>
                    `;
                }

                const totalValue = productData.stock_quantity * productData.cost_price;
                const potentialRevenue = productData.stock_quantity * productData.sell_price;
                const potentialProfit = potentialRevenue - totalValue;

                document.getElementById('product-header').innerHTML = `
                    <div class="product-top">
                        <div class="product-info">
                            <div class="product-name">${productData.name}</div>
                            <div class="product-meta">
                                <span>📦 SKU: ${productData.sku}</span>
                                <span>🏷️ ${productData.category || 'Uncategorized'}</span>
                                <span>📍 ${productData.location || 'No location'}</span>
                            </div>
                        </div>
                        <span class="stock-badge ${stockBadgeClass}">${stockText}</span>
                    </div>
                    <div class="quick-stats">
                        <div class="quick-stat">
                            <div class="quick-stat-value">${productData.stock_quantity}</div>
                            <div class="quick-stat-label">Units in Stock</div>
                        </div>
                        <div class="quick-stat">
                            <div class="quick-stat-value">$${totalValue.toFixed(0)}</div>
                            <div class="quick-stat-label">Inventory Value</div>
                        </div>
                        <div class="quick-stat">
                            <div class="quick-stat-value">$${potentialRevenue.toFixed(0)}</div>
                            <div class="quick-stat-label">Potential Revenue</div>
                        </div>
                        <div class="quick-stat">
                            <div class="quick-stat-value" style="color: #00ff00;">$${potentialProfit.toFixed(0)}</div>
                            <div class="quick-stat-label">Potential Profit</div>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Failed to load product header:', error);
            }
        }

        async function loadProductInfo() {
            try {
                document.getElementById('product-info').innerHTML = `
                    <div class="info-field">
                        <div class="info-label">Product Name</div>
                        <div class="info-value">${productData.name}</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">SKU</div>
                        <div class="info-value">${productData.sku}</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Category</div>
                        <div class="info-value">${productData.category || 'N/A'}</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Brand</div>
                        <div class="info-value">${productData.brand || 'N/A'}</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Size</div>
                        <div class="info-value">${productData.size || 'N/A'}</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Color</div>
                        <div class="info-value">${productData.color || 'N/A'}</div>
                    </div>
                    <div class="info-field full-width">
                        <div class="info-label">Description</div>
                        <div class="info-value">${productData.description || 'No description'}</div>
                    </div>
                `;
            } catch (error) {
                console.error('Failed to load product info:', error);
            }
        }

        async function loadPricingInfo() {
            try {
                const profit = productData.sell_price - productData.cost_price;
                const margin = ((profit / productData.cost_price) * 100).toFixed(1);
                const marginColor = margin < 20 ? '#ff4444' : margin < 40 ? '#ff8800' : '#00ff00';

                document.getElementById('pricing-info').innerHTML = `
                    <div class="margin-row">
                        <span class="margin-label">Cost Price</span>
                        <span class="margin-value">$${productData.cost_price.toFixed(2)}</span>
                    </div>
                    <div class="margin-row">
                        <span class="margin-label">Sell Price</span>
                        <span class="margin-value">$${productData.sell_price.toFixed(2)}</span>
                    </div>
                    <div class="margin-row">
                        <span class="margin-label">Profit per Unit</span>
                        <span class="margin-value" style="color: #00ff00;">$${profit.toFixed(2)}</span>
                    </div>
                    <div class="margin-row">
                        <span class="margin-label">Profit Margin</span>
                        <span class="margin-value" style="color: ${marginColor};">${margin}%</span>
                    </div>
                `;
            } catch (error) {
                console.error('Failed to load pricing info:', error);
            }
        }

        async function loadSupplierInfo() {
            try {
                document.getElementById('supplier-info').innerHTML = `
                    <div class="info-field">
                        <div class="info-label">Supplier Name</div>
                        <div class="info-value">${productData.supplier_name || 'Not specified'}</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Supplier SKU</div>
                        <div class="info-value">${productData.supplier_sku || 'N/A'}</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Lead Time</div>
                        <div class="info-value">${productData.lead_time_days ? productData.lead_time_days + ' days' : 'N/A'}</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Last Order Date</div>
                        <div class="info-value">${productData.last_order_date ? new Date(productData.last_order_date).toLocaleDateString() : 'Never'}</div>
                    </div>
                `;
            } catch (error) {
                console.error('Failed to load supplier info:', error);
            }
        }

        async function loadInventoryStatus() {
            try {
                const daysOfStock = productData.stock_quantity > 0 ? Math.floor(productData.stock_quantity / 2) : 0; // Assuming 2 units/day

                document.getElementById('inventory-status').innerHTML = `
                    <div class="info-field">
                        <div class="info-label">Current Stock</div>
                        <div class="info-value">${productData.stock_quantity} units</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Minimum Level</div>
                        <div class="info-value">${productData.min_stock_level} units</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Reorder Quantity</div>
                        <div class="info-value">${productData.reorder_quantity || 'Not set'}</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Storage Location</div>
                        <div class="info-value">${productData.location || 'Not specified'}</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Est. Days of Stock</div>
                        <div class="info-value">${daysOfStock} days</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Barcode</div>
                        <div class="info-value">${productData.barcode || 'N/A'}</div>
                    </div>
                `;
            } catch (error) {
                console.error('Failed to load inventory status:', error);
            }
        }

        async function loadActivityTimeline() {
            try {
                // Sample activity data
                const activities = [
                    { date: '2026-05-13', title: 'Stock Adjustment', desc: '+10 units added to inventory' },
                    { date: '2026-05-10', title: 'Sale Recorded', desc: '2 units sold for $' + (productData.sell_price * 2) },
                    { date: '2026-05-05', title: 'Price Updated', desc: 'Sell price changed to $' + productData.sell_price },
                    { date: '2026-04-28', title: 'Stock Received', desc: '50 units received from supplier' }
                ];

                let html = '';
                activities.forEach(activity => {
                    html += `
                        <div class="timeline-item">
                            <div class="timeline-date">${new Date(activity.date).toLocaleDateString()}</div>
                            <div class="timeline-title">${activity.title}</div>
                            <div class="timeline-desc">${activity.desc}</div>
                        </div>
                    `;
                });

                document.getElementById('activity-timeline').innerHTML = html;
            } catch (error) {
                console.error('Failed to load activity timeline:', error);
            }
        }

        function editProduct() {
            window.location.href = `product-form.html?id=${productId}`;
        }

        async function adjustStock() {
            const adjustment = prompt('Stock adjustment (use negative for decrease):', '0');
            if (!adjustment || isNaN(adjustment) || adjustment == 0) return;

            try {
                const response = await fetch(`${API_BASE}/stock/adjustments`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        product_id: productId,
                        quantity_change: parseInt(adjustment),
                        reason: 'manual_adjustment',
                        notes: 'Adjusted via product detail page'
                    })
                });

                if (response.ok) {
                    alert('Stock adjusted successfully!');
                    window.location.reload();
                } else {
                    alert('Failed to adjust stock');
                }
            } catch (error) {
                console.error('Failed to adjust stock:', error);
                alert('Error adjusting stock');
            }
        }

        async function recordSale() {
            const quantity = prompt('How many units sold?', '1');
            if (!quantity || isNaN(quantity) || quantity <= 0) return;

            try {
                const response = await fetch(`${API_BASE}/stock/sales`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        product_id: productId,
                        quantity: parseInt(quantity),
                        member_id: 1,
                        payment_method: 'card'
                    })
                });

                if (response.ok) {
                    alert('Sale recorded successfully!');
                    window.location.reload();
                } else {
                    alert('Failed to record sale');
                }
            } catch (error) {
                console.error('Failed to record sale:', error);
                alert('Error recording sale');
            }
        }

        function reorderProduct() {
            const quantity = productData.reorder_quantity || 20;
            if (confirm(`Reorder ${quantity} units of ${productData.name}?`)) {
                alert('Reorder request created');
            }
        }

        init();
    </script>
</body>
</html>
