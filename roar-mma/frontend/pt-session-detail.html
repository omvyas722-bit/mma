<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://localhost:*; img-src 'self' data:;">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <script defer src="/public/shared-auth.js"></script>
    <title>ROAR MMA - PT Session Details</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; }

        .sidebar { position: fixed; left: 0; top: 0; width: 240px; height: 100vh; background: #0f0f0f; border-right: 1px solid #222; padding: 20px; z-index: 100; }
        .logo { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #ff4444 0%, #ff6666 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; }
        .nav-menu { display: flex; flex-direction: column; gap: 5px; }
        .nav-item { padding: 12px 16px; border-radius: 8px; cursor: pointer; transition: all 0.3s; font-size: 14px; }
        .nav-item:hover { background: #1a1a1a; }
        .nav-item.active { background: #ff444420; color: #ff4444; }

        .main-content { margin-left: 240px; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { padding: 10px 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .back-btn:hover { border-color: #ff4444; }
        .header-title { font-size: 28px; font-weight: 700; }
        .header-actions { display: flex; gap: 10px; }

        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-primary { background: #ff4444; color: #fff; }
        .btn-primary:hover { background: #ff6666; }
        .btn-secondary { background: #1a1a1a; border: 1px solid #333; color: #fff; }
        .btn-success { background: #00ff0020; border: 1px solid #00ff00; color: #00ff00; }
        .btn-success:hover { background: #00ff0030; }
        .btn-danger { background: #ff444420; border: 1px solid #ff4444; color: #ff4444; }
        .btn-danger:hover { background: #ff444430; }

        .session-header { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 30px; margin-bottom: 20px; }
        .session-top { display: flex; justify-content: space-between; align-items: start; margin-bottom: 25px; }
        .session-info { flex: 1; }
        .session-title { font-size: 32px; font-weight: 700; margin-bottom: 10px; }
        .session-meta { display: flex; gap: 20px; font-size: 14px; color: #888; flex-wrap: wrap; }

        .status-badge { padding: 6px 16px; border-radius: 16px; font-size: 13px; font-weight: 600; }
        .status-scheduled { background: #ff880020; color: #ff8800; }
        .status-completed { background: #00ff0020; color: #00ff00; }
        .status-cancelled { background: #88888820; color: #888; }
        .status-no_show { background: #ff444420; color: #ff4444; }

        .price-display { text-align: center; background: #0a0a0a; border: 2px solid #00ff00; border-radius: 12px; padding: 20px; }
        .price-label { font-size: 14px; color: #888; margin-bottom: 10px; }
        .price-value { font-size: 36px; font-weight: 700; color: #00ff00; }
        .price-breakdown { font-size: 12px; color: #666; margin-top: 10px; }

        .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; }

        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .info-field { margin-bottom: 15px; }
        .info-label { font-size: 13px; color: #888; margin-bottom: 5px; }
        .info-value { font-size: 15px; color: #fff; }

        .participant-card { background: #0a0a0a; border: 1px solid #222; border-radius: 8px; padding: 20px; margin-bottom: 15px; }
        .participant-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .participant-name { font-size: 18px; font-weight: 600; }
        .participant-role { font-size: 12px; color: #888; padding: 4px 10px; background: #1a1a1a; border-radius: 12px; }
        .participant-details { display: flex; gap: 20px; font-size: 13px; color: #888; }

        .notes-section { background: #0a0a0a; border: 1px solid #222; border-radius: 8px; padding: 20px; }
        .notes-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .notes-title { font-size: 16px; font-weight: 600; }
        .notes-content { font-size: 14px; color: #e0e0e0; line-height: 1.6; white-space: pre-wrap; }
        .notes-empty { font-size: 14px; color: #666; text-align: center; padding: 20px; }

        .timeline { display: flex; flex-direction: column; gap: 15px; }
        .timeline-item { background: #0a0a0a; border: 1px solid #222; border-radius: 8px; padding: 15px; }
        .timeline-date { font-size: 12px; color: #666; margin-bottom: 5px; }
        .timeline-title { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
        .timeline-desc { font-size: 13px; color: #888; }

        .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

        .loading { text-align: center; padding: 40px; color: #666; }
        .spinner { border: 3px solid #333; border-top: 3px solid #ff4444; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">⚡ ROAR MMA</div>
        <div class="nav-menu">
            <div class="nav-item" >📊 Dashboard</div>
            <div class="nav-item" >🤖 AI Command</div>
            <div class="nav-item" >⚙️ Workflows</div>
            <div class="nav-item" >📅 Classes</div>
            <div class="nav-item" >🥋 Belt Progression</div>
            <div class="nav-item" >✅ Check-In</div>
            <div class="nav-item" >⚠️ Retention</div>
            <div class="nav-item" >💳 Billing</div>
            <div class="nav-item" >👥 Members</div>
            <div class="nav-item" >📞 Leads</div>
            <div class="nav-item active" >🏋️ PT Sessions</div>
            <div class="nav-item" >📦 Stock</div>
        </div>
    </div>

    <div class="main-content" role="main" aria-label="Main content">
        <div class="header">
            <div class="header-left">
                <button class="back-btn" >← Back</button>
                <div class="header-title" id="page-title">PT Session Details</div>
            </div>
            <div class="header-actions" id="header-actions">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>

        <div class="session-header" id="session-header">
            <div class="loading"><div class="spinner"></div>Loading session...</div>
        </div>

        <div class="content-grid">
            <div>
                <div class="card">
                    <div class="card-title">Participants</div>
                    <div id="participants">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Session Details</div>
                    <div class="info-grid" id="session-details">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Session Notes</div>
                    <div class="notes-section" id="session-notes">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>
            </div>

            <div>
                <div class="card">
                    <div class="card-title">Payment Information</div>
                    <div id="payment-info">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Activity Log</div>
                    <div class="timeline" id="activity-log">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var API_BASE = RoarMMA.API_BASE;
        
        let sessionId = null;
        let sessionData = null;

        async function init() {
            const params = new URLSearchParams(window.location.search);
            sessionId = params.get('id') || 1;

            if (!RoarMMA.requireAuth()) return;
            try {
                await Promise.all([
                    loadSessionHeader(),
                    loadParticipants(),
                    loadSessionDetails(),
                    loadSessionNotes(),
                    loadPaymentInfo(),
                    loadActivityLog()
                ]);
            } catch (error) {
                // Log suppressed
            }
        }

        async function loadSessionHeader() {
            try {
                const response = await fetch(`${API_BASE}/pt-sessions`, {
                    headers: { 'Authorization': 'Bearer ' + RoarMMA.getToken() }
                });
                const sessions = await response.json();
                sessionData = sessions.find(s => s.id == sessionId) || sessions[0];

                const statusClass = `status-${sessionData.status}`;
                const date = new Date(sessionData.scheduled_date).toLocaleDateString('en-US', {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
                });

                document.getElementById('page-title').textContent = `Session #${sessionData.id}`;

                document.getElementById('session-header').innerHTML = `
                    <div class="session-top">
                        <div class="session-info">
                            <div class="session-title">PT Session #${sessionData.id}</div>
                            <div class="session-meta">
                                <span>📅 ${date}</span>
                                <span>⏰ ${sessionData.scheduled_time}</span>
                                <span>⏱️ ${sessionData.duration_minutes} minutes</span>
                                <span>💰 $${sessionData.amount}</span>
                            </div>
                        </div>
                        <span class="status-badge ${statusClass}">${sessionData.status.toUpperCase().replace('_', ' ')}</span>
                    </div>
                `;

                // Update header actions based on status
                let actionsHtml = '';
                if (sessionData.status === 'scheduled') {
                    actionsHtml = `
                        <button class="btn btn-success" >✅ Mark Complete</button>
                        <button class="btn btn-danger" >❌ Cancel</button>
                        <button class="btn btn-secondary" >📅 Reschedule</button>
                    `;
                } else if (sessionData.status === 'completed') {
                    actionsHtml = `
                        <button class="btn btn-secondary" >📄 Receipt</button>
                        <button class="btn btn-secondary" >🔄 Book Follow-up</button>
                    `;
                }
                document.getElementById('header-actions').innerHTML = actionsHtml;

            } catch (error) {
                // Log suppressed
            }
        }

        async function loadParticipants() {
            try {
                document.getElementById('participants').innerHTML = `
                    <div class="participant-card">
                        <div class="participant-header">
                            <div class="participant-name">Member #${sessionData.member_id}</div>
                            <span class="participant-role">CLIENT</span>
                        </div>
                        <div class="participant-details">
                            <span>📧 member@example.com</span>
                            <span>📱 0412345678</span>
                        </div>
                    </div>
                    <div class="participant-card">
                        <div class="participant-header">
                            <div class="participant-name">Coach #${sessionData.coach_id}</div>
                            <span class="participant-role">COACH</span>
                        </div>
                        <div class="participant-details">
                            <span>⭐ 4.9 rating</span>
                            <span>📊 156 sessions</span>
                        </div>
                    </div>
                `;
            } catch (error) {
                // Log suppressed
            }
        }

        async function loadSessionDetails() {
            try {
                const createdDate = new Date(sessionData.created_at).toLocaleDateString();
                const sessionType = sessionData.session_type || 'General Training';

                document.getElementById('session-details').innerHTML = `
                    <div class="info-field">
                        <div class="info-label">Session Type</div>
                        <div class="info-value">${sessionType}</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Duration</div>
                        <div class="info-value">${sessionData.duration_minutes} minutes</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Status</div>
                        <div class="info-value">${sessionData.status.replace('_', ' ')}</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Payment Method</div>
                        <div class="info-value">${sessionData.payment_method || 'Not specified'}</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Booked On</div>
                        <div class="info-value">${createdDate}</div>
                    </div>
                    <div class="info-field">
                        <div class="info-label">Session ID</div>
                        <div class="info-value">#${sessionData.id}</div>
                    </div>
                `;
            } catch (error) {
                // Log suppressed
            }
        }

        async function loadSessionNotes() {
            try {
                const notes = sessionData.notes || '';

                if (notes) {
                    document.getElementById('session-notes').innerHTML = `
                        <div class="notes-header">
                            <div class="notes-title">Session Notes</div>
                            <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;" >✏️ Edit</button>
                        </div>
                        <div class="notes-content">${notes}</div>
                    `;
                } else {
                    document.getElementById('session-notes').innerHTML = `
                        <div class="notes-empty">No notes for this session</div>
                        <button class="btn btn-secondary" style="margin-top: 15px; width: 100%;" >+ Add Notes</button>
                    `;
                }
            } catch (error) {
                // Log suppressed
            }
        }

        async function loadPaymentInfo() {
            try {
                const coachCommission = Math.round(sessionData.amount * 0.5);
                const gymRevenue = sessionData.amount - coachCommission;

                document.getElementById('payment-info').innerHTML = `
                    <div class="price-display">
                        <div class="price-label">Total Amount</div>
                        <div class="price-value">$${sessionData.amount}</div>
                        <div class="price-breakdown">
                            Coach: $${coachCommission} • Gym: $${gymRevenue}
                        </div>
                    </div>
                    <div style="margin-top: 20px;">
                        <div class="info-field">
                            <div class="info-label">Payment Status</div>
                            <div class="info-value" style="color: #00ff00;">Paid</div>
                        </div>
                        <div class="info-field">
                            <div class="info-label">Payment Method</div>
                            <div class="info-value">${sessionData.payment_method || 'Card'}</div>
                        </div>
                        <div class="info-field">
                            <div class="info-label">Commission Rate</div>
                            <div class="info-value">50%</div>
                        </div>
                    </div>
                `;
            } catch (error) {
                // Log suppressed
            }
        }

        async function loadActivityLog() {
            try {
                const activities = [
                    { date: sessionData.created_at, title: 'Session Booked', desc: 'PT session scheduled' },
                    { date: sessionData.created_at, title: 'Payment Received', desc: `$${sessionData.amount} paid via ${sessionData.payment_method || 'card'}` }
                ];

                if (sessionData.status === 'completed') {
                    activities.push({
                        date: sessionData.updated_at,
                        title: 'Session Completed',
                        desc: 'Session marked as complete'
                    });
                }

                let html = '';
                activities.forEach(activity => {
                    html += `
                        <div class="timeline-item">
                            <div class="timeline-date">${new Date(activity.date).toLocaleDateString()}</div>
                            <div class="timeline-title">${activity.title}</div>
                            <div class="timeline-desc">${activity.desc}</div>
                        </div>
                    `;
                });

                document.getElementById('activity-log').innerHTML = html;
            } catch (error) {
                // Log suppressed
            }
        }

        async function completeSession() {
            if (!confirm('Mark this session as complete?')) return;

            try {
                const response = await fetch(`${API_BASE}/pt-sessions/${sessionId}/complete`, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + RoarMMA.getToken(),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ notes: 'Session completed via dashboard' })
                });

                if (response.ok) {
                    alert('Session marked as complete!');
                    window.location.reload();
                } else {
                    alert('Failed to complete session');
                }
            } catch (error) {
                // Log suppressed
                alert('Error completing session');
            }
        }

        async function cancelSession() {
            if (!confirm('Cancel this session? This cannot be undone.')) return;

            try {
                const response = await fetch(`${API_BASE}/pt-sessions/${sessionId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': 'Bearer ' + RoarMMA.getToken(),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: 'cancelled' })
                });

                if (response.ok) {
                    alert('Session cancelled');
                    window.location.reload();
                } else {
                    alert('Failed to cancel session');
                }
            } catch (error) {
                // Log suppressed
                alert('Error cancelling session');
            }
        }

        function rescheduleSession() {
            alert('Reschedule functionality would open a date/time picker');
        }

        function editNotes() {
            const notes = prompt('Edit session notes:', sessionData.notes || '');
            if (notes !== null) {
                alert('Notes updated');
                window.location.reload();
            }
        }

        function addNotes() {
            const notes = prompt('Add session notes:');
            if (notes) {
                alert('Notes added');
                window.location.reload();
            }
        }

        init();
    </script>
</body>
</html>
